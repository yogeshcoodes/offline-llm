<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aethos AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="favicon" href="logo-black.png">
</head>

<body>
    <div id="splashOverlay" class="splash-overlay">
        <div class="splash-content">
            <img src="logo-black.png" alt="Aethos AI Logo" class="splash-logo" id="splashLogoImg">
            <div class="splash-text">Welcome to <span>Aethos AI</span></div>
        </div>
    </div>

    <div id="app">
        <div id="sidebarOverlay"></div>

        <aside id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title"></span>
            </div>
            <div class="sidebar-search">
                <input type="text" placeholder="Search chats..." id="searchInput">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
            </div>
            <div class="recent-chats" id="recentChats">
                <div class="recent-chats-title"></div>
                <div class="chat-list" id="chatList"></div>
                <div class="no-recent-chats" id="noRecentChats">No recent chats</div>
            </div>
            <div class="sidebar-bottom">
                <button class="sidebar-bottom-btn" id="btnUserAccount" title="User Account">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-user-round-icon lucide-user-round">
                        <circle cx="12" cy="8" r="5" />
                        <path d="M20 21a8 8 0 0 0-16 0" />
                    </svg>
                    <span>Account</span>
                </button>
                <button class="sidebar-bottom-btn" id="btnSettings" title="Settings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                    <span>Settings</span>
                </button>
                <button class="sidebar-bottom-btn" id="btnThemeToggle" title="Toggle theme">
                    <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>
                    <span class="theme-label">Light</span>
                </button>
            </div>
        </aside>

        <main id="main">
            <div id="audioPlayer" class="audio-player hidden">
                <button id="audioPlayPauseBtn" class="audio-btn">
                    <svg id="audioIconPlay" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="lucide lucide-play-icon lucide-play" style="display:none;">
                        <path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z" />
                    </svg>
                    <svg id="audioIconPause" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="lucide lucide-pause-icon lucide-pause">
                        <rect x="14" y="3" width="5" height="18" rx="1" />
                        <rect x="5" y="3" width="5" height="18" rx="1" />
                    </svg>
                </button>
                <div class="audio-progress-bar">
                    <div id="audioProgressFill" class="audio-progress-fill"></div>
                </div>
                <button id="audioCloseBtn" class="audio-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18" />
                        <path d="m6 6 12 12" />
                    </svg>
                </button>
            </div>

            <button class="desktop-sidebar-toggle" id="desktopSidebarToggle" title="Toggle sidebar">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="currentColor"
                    fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 9L20 9"></path>
                    <path d="M4 15L14 15"></path>
                </svg>
            </button>

            <div class="desktop-right-actions">
                <button class="desktop-newchat-btn" id="desktopNewChatBtn" title="New Chat">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                        <path
                            d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z" />
                    </svg>
                </button>
                <button class="desktop-menu-btn" id="desktopMenuBtn" title="More options">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="1" />
                        <circle cx="12" cy="5" r="1" />
                        <circle cx="12" cy="19" r="1" />
                    </svg>
                </button>
                <div class="dropdown-menu hidden" id="dropdownMenu">
                    <button class="dropdown-item" id="dropdownClearChat">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6" />
                            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                            <path d="M10 11v6" />
                            <path d="M14 11v6" />
                        </svg>
                        Clear Chat
                    </button>
                    <button class="dropdown-item" id="dropdownExportChat">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="m18 9-6-6-6 6" />
                            <path d="M12 3v14" />
                            <path d="M5 21h14" />
                        </svg>
                        Export Chat
                    </button>
                </div>
            </div>

            <div class="mobile-header">
                <button id="sidebarExpandBtn" class="circular-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                        color="currentColor" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M4 9L20 9"></path>
                        <path d="M4 15L14 15"></path>
                    </svg>
                </button>
                <div class="mobile-right-actions">
                    <button id="mobileNewChatBtn" class="circular-btn" title="New Chat">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                            <path
                                d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z" />
                        </svg>
                    </button>
                    <button id="mobileMenuBtn" class="circular-btn" title="More options">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="1" />
                            <circle cx="12" cy="5" r="1" />
                            <circle cx="12" cy="19" r="1" />
                        </svg>
                    </button>
                    <div class="dropdown-menu hidden" id="mobileDropdownMenu">
                        <button class="dropdown-item" id="mobileDropdownClearChat">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6" />
                                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                                <path d="M10 11v6" />
                                <path d="M14 11v6" />
                            </svg>
                            Clear Chat
                        </button>
                        <button class="dropdown-item" id="mobileDropdownExportChat">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2">
                                <path d="m18 9-6-6-6 6" />
                                <path d="M12 3v14" />
                                <path d="M5 21h14" />
                            </svg>
                            Export Chat
                        </button>
                    </div>
                </div>
            </div>

            <div id="welcomeScreen">
                <img src="logo-black.png" alt="logo" class="welcome-logo" id="welcomeLogo" draggable="false"
                    oncontextmenu="return false" ondragstart="return false">
                <div class="welcome-title">How can I help you today?</div>
                <div class="welcome-sub">Your Smart AI Assistant</div>
                <div class="suggested-prompts">
                    <div class="suggested-prompt" data-prompt="Create a realistic image of an elephant.">Create an image of an elephant.</div>
                    <div class="suggested-prompt" data-prompt="Write a poem about the stars">Write a poem</div>
                    <div class="suggested-prompt" data-prompt="Summarize this news article:">Summarize an article</div>
                    <div class="suggested-prompt" data-prompt="Help me debug this code:">Debug code</div>
                </div>
                <div class="welcome-input-container" id="welcomeInputContainer">
                    <div class="input-container">
                        <div id="attachmentPreviewWelcome" class="attachment-preview hidden"></div>
                        <button class="icon-btn" id="btnAttachWelcome" title="Attach files">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M12 5v14M5 12h14" />
                            </svg>
                        </button>

                        <button class="search-toggle-btn" id="btnSearchWelcome" title="Toggle Web Search">
                            <!-- Globe SVG replaces text -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-globe-icon lucide-globe">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
                                <path d="M2 12h20"/>
                            </svg>
                        </button>
                        <button class="think-toggle-btn" id="btnThinkWelcome" title="Toggle Extended Thinking">
                            <!-- Brain SVG -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-brain-icon lucide-brain">
                                <path d="M12 18V5"/>
                                <path d="M15 13a4.17 4.17 0 0 1-3-4 4.17 4.17 0 0 1-3 4"/>
                                <path d="M17.598 6.5A3 3 0 1 0 12 5a3 3 0 1 0-5.598 1.5"/>
                                <path d="M17.997 5.125a4 4 0 0 1 2.526 5.77"/>
                                <path d="M18 18a4 4 0 0 0 2-7.464"/>
                                <path d="M19.967 17.483A4 4 0 1 1 12 18a4 4 0 1 1-7.967-.517"/>
                                <path d="M6 18a4 4 0 0 1-2-7.464"/>
                                <path d="M6.003 5.125a4 4 0 0 0-2.526 5.77"/>
                            </svg>
                        </button>

                        <textarea id="welcomeUserInput" rows="1" placeholder="Ask Aethos"></textarea>
                        <button class="icon-btn" id="btnMicWelcome" title="Voice input">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                                <line x1="12" y1="19" x2="12" y2="23" />
                                <line x1="8" y1="23" x2="16" y2="23" />
                            </svg>
                        </button>
                        <button class="icon-btn" id="btnSendWelcome" disabled>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-send">
                                <path d="m5 12 7-7 7 7" />
                                <path d="M12 19V5" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <div id="chatArea"></div>

            <div class="input-container-wrapper" id="chatInputWrapper" style="display:none;">
                <button class="scroll-down-btn" id="scrollDownBtn" title="Scroll to bottom">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-chevron-down-icon lucide-chevron-down">
                        <path d="m6 9 6 6 6-6" />
                    </svg>
                </button>
                <div class="input-container">
                    <div id="attachmentPreviewMain" class="attachment-preview hidden"></div>
                    <button class="icon-btn" id="btnAttach" title="Attach files">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 5v14M5 12h14" />
                        </svg>
                    </button>

                    <button class="search-toggle-btn" id="btnSearchMain" title="Toggle Web Search">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-globe-icon lucide-globe">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
                            <path d="M2 12h20"/>
                        </svg>
                    </button>
                    <button class="think-toggle-btn" id="btnThinkMain" title="Toggle Extended Thinking">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-brain-icon lucide-brain">
                            <path d="M12 18V5"/>
                            <path d="M15 13a4.17 4.17 0 0 1-3-4 4.17 4.17 0 0 1-3 4"/>
                            <path d="M17.598 6.5A3 3 0 1 0 12 5a3 3 0 1 0-5.598 1.5"/>
                            <path d="M17.997 5.125a4 4 0 0 1 2.526 5.77"/>
                            <path d="M18 18a4 4 0 0 0 2-7.464"/>
                            <path d="M19.967 17.483A4 4 0 1 1 12 18a4 4 0 1 1-7.967-.517"/>
                            <path d="M6 18a4 4 0 0 1-2-7.464"/>
                            <path d="M6.003 5.125a4 4 0 0 0-2.526 5.77"/>
                        </svg>
                    </button>

                    <textarea id="userInput" rows="1" placeholder="Ask Aethos..."></textarea>
                    <button class="icon-btn" id="btnMic" title="Voice input">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                            <line x1="12" y1="19" x2="12" y2="23" />
                            <line x1="8" y1="23" x2="16" y2="23" />
                        </svg>
                    </button>
                    <button class="icon-btn" id="btnSend" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-send">
                            <path d="m5 12 7-7 7 7" />
                            <path d="M12 19V5" />
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals (unchanged) -->
    <div class="modal-overlay hidden" id="settingsModalOverlay">
        <div class="modal">
            <h3>Settings</h3>
            <div class="setting-row">
                <label for="sendOnEnter">Send with Enter</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="sendOnEnter" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="setting-row" style="flex-direction: column; align-items: flex-start; gap: 8px;">
                <label for="customInstructions">Custom Instructions</label>
                <textarea id="customInstructions" rows="3"
                    placeholder="How should the AI respond? (e.g., 'Keep answers short and friendly')"
                    style="width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 8px; font-family: inherit; font-size: 0.9rem; resize: vertical; background: var(--surface); color: var(--text);"></textarea>
            </div>
            <div class="setting-row" style="flex-direction: column; align-items: flex-start; gap: 8px;">
                <label for="apiKeyInput">API Key</label>
                <input type="password" id="apiKeyInput" placeholder="Enter API key (e.g., AQ...)"
                    style="width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 8px; font-family: inherit; font-size: 0.9rem; background: var(--surface); color: var(--text);">
            </div>
            <div class="setting-row accent-picker-row">
                <label>Accent colour</label>
                <div class="accent-colors" id="accentColors">
                    <div class="accent-circle active" data-color="#2A7CCC" style="background: #2A7CCC;"></div>
                    <div class="accent-circle" data-color="#8B5CF6" style="background: #8B5CF6;"></div>
                    <div class="accent-circle" data-color="#EC4899" style="background: #EC4899;"></div>
                    <div class="accent-circle" data-color="#F97316" style="background: #F97316;"></div>
                    <div class="accent-circle" data-color="#10B981" style="background: #10B981;"></div>
                    <div class="accent-circle" data-color="#EF4444" style="background: #EF4444;"></div>
                </div>
            </div>
            <div class="modal-buttons">
                <button class="btn-secondary" id="btnSettingsClose">Cancel</button>
                <button class="btn-primary" id="btnSettingsSave">Save</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay hidden" id="confirmClearDialog">
        <div class="modal" id="confirmDialog">
            <h3 id="confirmDialogTitle">Clear all messages?</h3>
            <p style="color: var(--text-secondary);" id="confirmDialogMessage">This action cannot be undone.</p>
            <div class="modal-buttons">
                <button class="btn-secondary" id="confirmClearCancel">Cancel</button>
                <button class="btn-primary" id="confirmClearOk">Clear</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay hidden" id="userAccountModal">
        <div class="modal user-account-modal">
            <h3>Sign in or create account</h3>
            <div class="user-auth-options">
                <button class="user-option-btn" data-provider="google">
                    <!-- Google SVG -->
                </button>
                <button class="user-option-btn" data-provider="facebook">
                    <!-- Facebook SVG -->
                </button>
                <button class="user-option-btn" data-provider="phone">
                    <!-- Phone SVG -->
                </button>
            </div>
            <button class="btn-secondary user-account-close-btn" id="btnUserAccountClose">Cancel</button>
        </div>
    </div>

    <div id="toast"></div>

    <script src="CDN/prism.min.js"></script>
    <script src="CDN/prism-python.min.js"></script>
    <script src="CDN/prism-javascript.min.js"></script>
    <script src="CDN/prism-css.min.js"></script>

    <script src="script.js"></script>
</body>

</html>
